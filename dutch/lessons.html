<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lesson — Dutch</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a252f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5;
           min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a252f; color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.88em; }
    .back:hover { color: white; }
    .hearts { font-size: 1.05em; letter-spacing: 2px; min-width: 60px; text-align: right; }

    .progress-bar { height: 5px; background: #2c3e50; flex-shrink: 0; }
    .progress-fill { height: 100%; background: #2980b9; transition: width .3s; }

    /* ── Screens ── */
    .screen { flex: 1; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    .center-box {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px; gap: 14px; text-align: center;
    }
    .big-icon { font-size: 3.2em; }
    h2 { font-size: 1.25em; font-weight: 800; color: #2c3e50; }
    .sub { font-size: 0.88em; color: #7f8c8d; max-width: 300px; line-height: 1.5; }
    .btn-primary {
      padding: 14px 36px; background: #2980b9; color: white; border: none;
      border-radius: 14px; font-size: 0.95em; font-weight: 700; cursor: pointer;
    }
    .btn-secondary {
      padding: 12px 28px; background: #f0f2f5; color: #7f8c8d; border: none;
      border-radius: 14px; font-size: 0.88em; cursor: pointer;
      text-decoration: none; display: inline-block;
    }

    /* ── Question screen ── */
    #screen-q { padding: 18px 16px 24px; gap: 14px; align-items: stretch; }

    .q-label {
      font-size: 0.68em; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; color: #7f8c8d; text-align: center;
    }

    .q-prompt {
      background: white; border-radius: 16px; padding: 24px 20px;
      text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-top: 4px solid #2980b9;
    }
    .prompt-word { font-size: 1.75em; font-weight: 800; color: #2c3e50; line-height: 1.2; }
    .prompt-hint { font-size: 0.82em; color: #7f8c8d; margin-top: 6px; line-height: 1.4; }
    .btn-tts {
      margin-top: 12px; background: #eaf4fb; border: none; border-radius: 8px;
      padding: 7px 16px; font-size: 0.82em; cursor: pointer; color: #2980b9; font-weight: 600;
    }
    .btn-tts:hover { background: #d4e9f7; }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      width: 100%; padding: 15px 18px; background: white; color: #2c3e50;
      border: 2px solid #e1e8ed; border-radius: 14px; font-size: 0.93em;
      font-weight: 600; cursor: pointer; text-align: left;
      transition: border-color .15s, background .15s;
    }
    .choice-btn:hover:not(:disabled) { border-color: #2980b9; background: #eaf4fb; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { border-color: #27ae60 !important; background: #eafaf1 !important; color: #27ae60; }
    .choice-btn.wrong   { border-color: #e74c3c !important; background: #fdedec !important; color: #e74c3c; }
    .choice-btn.reveal  { border-color: #27ae60 !important; background: #eafaf1 !important; color: #27ae60; }

    /* ── Feedback ── */
    .feedback {
      border-radius: 14px; padding: 14px 16px; display: none;
      flex-direction: column; gap: 4px;
    }
    .feedback.correct { display: flex; background: #eafaf1; border: 2px solid #27ae60; }
    .feedback.wrong   { display: flex; background: #fdedec; border: 2px solid #e74c3c; }
    .fb-head { font-weight: 700; font-size: 0.9em; }
    .feedback.correct .fb-head { color: #27ae60; }
    .feedback.wrong   .fb-head { color: #e74c3c; }
    .fb-body { font-size: 0.82em; color: #7f8c8d; line-height: 1.4; }

    .btn-continue {
      width: 100%; padding: 15px; background: #2980b9; color: white; border: none;
      border-radius: 14px; font-size: 1em; font-weight: 700; cursor: pointer;
      display: none;
    }
    .btn-continue.visible { display: block; }

    /* ── Finish screen ── */
    .stars { font-size: 2.4em; letter-spacing: 6px; }
    .score-row { display: flex; gap: 24px; justify-content: center; }
    .sc { text-align: center; }
    .sc-num { font-size: 2em; font-weight: 800; color: #2980b9; }
    .sc-lbl { font-size: 0.75em; color: #7f8c8d; margin-top: 2px; }

    /* Weak words summary */
    .weak-summary {
      background: #fef5e7; border-radius: 14px; padding: 14px 16px;
      max-width: 340px; width: 100%; text-align: left;
    }
    .weak-summary h3 { font-size: 0.85em; color: #e67e22; font-weight: 700; margin-bottom: 8px; }
    .weak-word-item { font-size: 0.82em; color: #2c3e50; padding: 3px 0; border-bottom: 1px solid #fdebd0; }
    .weak-word-item:last-child { border-bottom: none; }
    .weak-word-item .ww-term  { font-weight: 700; }
    .weak-word-item .ww-trans { color: #7f8c8d; margin-left: 6px; }
    .q-highlight { color: #e67e22; }
    .type-area { display: flex; flex-direction: column; gap: 10px; }
    .type-input {
      width: 100%; padding: 15px 16px; border: 2px solid #e1e8ed;
      border-radius: 14px; font-size: 1em; font-family: inherit;
      transition: border-color .15s;
    }
    .type-input:focus { outline: none; border-color: #2980b9; }
    .btn-submit {
      padding: 15px; background: #2980b9; color: white; border: none;
      border-radius: 14px; font-size: 1em; font-weight: 700; cursor: pointer;
    }
    .scramble-area { display: flex; flex-direction: column; gap: 12px; }
    .scramble-answer {
      min-height: 54px; background: white; border-radius: 14px; padding: 10px 12px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      border: 2px dashed #c8d6e5;
    }
    .scramble-bank { display: flex; flex-wrap: wrap; gap: 8px; }
    .word-tile {
      padding: 9px 14px; background: white; border: 2px solid #c8d6e5;
      border-radius: 10px; cursor: pointer; font-size: 0.9em; font-weight: 600;
      color: #2c3e50; transition: border-color .15s, opacity .15s;
    }
    .word-tile:hover:not(:disabled) { border-color: #2980b9; }
    .word-tile:disabled { opacity: 0.4; cursor: default; }
    .word-tile.in-answer { border-color: #2980b9; background: #eaf4fb; }
    .mp-grid { display: flex; gap: 10px; }
    .mp-col  { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .mp-tile {
      flex: 1; width: 100%; padding: 13px 10px;
      background: white; border: 2px solid #e1e8ed; border-radius: 14px;
      font-size: 0.85em; font-weight: 600; color: #2c3e50; cursor: pointer;
      text-align: center; transition: border-color .15s, background .15s;
      line-height: 1.3; word-break: break-word;
    }
    .mp-tile:hover:not(:disabled) { border-color: #2980b9; background: #eaf4fb; }
    .mp-tile.selected { border-color: #2980b9; background: #eaf4fb; color: #2980b9; }
    .mp-tile.correct  { border-color: #27ae60 !important; background: #eafaf1 !important; color: #27ae60 !important; }
    .mp-tile.wrong    { border-color: #e74c3c !important; background: #fdedec !important; color: #e74c3c !important; }
    .mp-tile:disabled { cursor: default; }
  </style>
</head>
<body>

<header>
  <a class="back" href="index.html">← Dutch</a>
  <span class="hearts" id="hearts">❤️❤️❤️</span>
</header>
<div class="progress-bar">
  <div class="progress-fill" id="prog-fill" style="width:0%"></div>
</div>

<!-- Start screen -->
<div class="screen active" id="screen-start">
  <div class="center-box">
    <div class="big-icon">🎯</div>
    <h2 id="start-title">Let's practice!</h2>
    <p class="sub" id="start-sub">Loading…</p>
    <button class="btn-primary" id="btn-start" onclick="startLesson()">Begin</button>
    <a class="btn-secondary" href="index.html">Back</a>
  </div>
</div>

<!-- Question screen -->
<div class="screen" id="screen-q">
  <div class="q-label"    id="q-label"></div>
  <div class="q-prompt">
    <div class="prompt-word" id="prompt-word"></div>
    <div class="prompt-hint" id="prompt-hint"></div>
    <button class="btn-tts" id="btn-tts" style="display:none" onclick="speakPrompt()">🔊 Listen</button>
  </div>
  <div class="choices" id="choices"></div>
  <div class="type-area" id="type-area" style="display:none">
    <input type="text" id="type-input" class="type-input"
           placeholder="Type your answer…"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')submitType()">
    <button class="btn-submit" onclick="submitType()">Check →</button>
  </div>
  <div class="scramble-area" id="scramble-area" style="display:none">
    <div class="scramble-answer" id="scramble-answer"></div>
    <div class="scramble-bank"   id="scramble-bank"></div>
  </div>
  <div class="mp-grid" id="mp-grid" style="display:none">
    <div class="mp-col" id="mp-col-left"></div>
    <div class="mp-col" id="mp-col-right"></div>
  </div>
  <div class="feedback" id="feedback">
    <div class="fb-head" id="fb-head"></div>
    <div class="fb-body" id="fb-body"></div>
  </div>
  <button class="btn-continue" id="btn-continue" onclick="nextQuestion()">Continue →</button>
</div>

<!-- Finish screen -->
<div class="screen" id="screen-finish">
  <div class="center-box">
    <div class="stars"  id="finish-stars">⭐⭐⭐</div>
    <h2>Lesson complete!</h2>
    <div class="score-row">
      <div class="sc"><div class="sc-num" id="fin-correct">0</div><div class="sc-lbl">Correct</div></div>
      <div class="sc"><div class="sc-num" id="fin-wrong">0</div><div class="sc-lbl">Wrong</div></div>
      <div class="sc"><div class="sc-num" id="fin-xp">0</div><div class="sc-lbl">XP</div></div>
    </div>
    <div class="weak-summary" id="weak-summary" style="display:none">
      <h3>💪 Added to Weak Words — review these in flashcards:</h3>
      <div id="weak-list"></div>
    </div>
    <button class="btn-primary" onclick="startLesson()">Play Again</button>
    <a class="btn-secondary" href="index.html">Back to Hub</a>
  </div>
</div>

<script src="vocab.js"></script>
<script>
  const SESSION_SIZE = 10;
  let questions = [], qIndex = 0, hearts = 3, correctCount = 0, wrongCount = 0;
  let currentQ = null, answered = false, currentPromptEs = '';
  let wrongWords = []; // track which words were answered wrong this session

  /* ── Init ─────────────────────────────── */
  function initStart() {
    const all = VS.getAll();
    const btn = document.getElementById('btn-start');
    if (all.length < 4) {
      document.getElementById('start-title').textContent = 'Need more words';
      document.getElementById('start-sub').textContent =
        'Add at least 4 vocabulary words to the hub before starting a lesson.';
      btn.textContent = 'Add Words';
      btn.onclick = () => location.href = 'index.html';
    } else {
      document.getElementById('start-title').textContent = "Let's practice!";
      document.getElementById('start-sub').textContent =
        `${all.length} word${all.length !== 1 ? 's' : ''} in your vocabulary · 3 lives · wrong answers are flagged as weak`;
      btn.onclick = startLesson;
    }
  }

  /* ── Build lesson ─────────────────────── */
  function startLesson() {
    const all = VS.getAll();
    if (all.length < 4) { location.href = 'index.html'; return; }

    const now  = Date.now();
    const due  = all.filter(w => (w.nextReview || 0) <= now);
    const rest = shuffle(all.filter(w => (w.nextReview || 0) > now));
    const pool = shuffle([...due, ...rest]).slice(0, SESSION_SIZE);

    const indivQs = pool.map(w => makeQuestion(w, all)).filter(Boolean);
    const matchRounds = [];
    for (let i = 0; i + 3 < pool.length; i += 4)
      matchRounds.push({ type: 'match-pairs', label: 'Match each word with its translation', words: pool.slice(i, i + 4) });
    questions = [];
    let mi = 0;
    indivQs.forEach((q, idx) => {
      questions.push(q);
      if ((idx + 1) % 4 === 0 && mi < matchRounds.length) questions.push(matchRounds[mi++]);
    });
    if (mi < matchRounds.length) questions.push(...matchRounds.slice(mi));
    wrongWords  = [];
    qIndex      = 0;
    hearts      = 3;
    correctCount= 0;
    wrongCount  = 0;

    if (!questions.length) { location.href = 'index.html'; return; }

    updateHearts(); updateProgress();
    showScreen('screen-q');
    showQuestion();
  }

  function makeQuestion(word, all) {
    const others = shuffle(all.filter(w => w.id !== word.id));
    if (others.length < 3) return null;
    const dist = others.slice(0, 3);

    const types = ['es-to-en', 'en-to-es', 'type-word'];
    if (VS.hasTTS()) types.push('listen-pick', 'listen-type');
    if (word.examples && word.examples.length) {
      types.push('example-ctx');
      if (word.examples.some(ex => ex.es && ex.es.split(' ').length >= 3))
        types.push('sentence-scramble');
      if (word.examples.some(ex => ex.es && ex.es.toLowerCase().includes(word.term.toLowerCase())))
        types.push('fill-blank');
    }
    const type = types[Math.floor(Math.random() * types.length)];

    if (type === 'es-to-en') {
      return {
        word, type,
        label:   'What does this mean?',
        prompt:  word.term,
        lang:    'es',
        hint:    word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        options: shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:  word.translation,
        explain: word.definition || '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'en-to-es') {
      return {
        word, type,
        label:   'How do you say this in Dutch?',
        prompt:  word.translation,
        lang:    'en',
        hint:    word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        options: shuffle([word.term, ...dist.map(w => w.term)]),
        answer:  word.term,
        explain: word.definition || '"' + word.translation + '" → "' + word.term + '"'
      };
    }
    if (type === 'type-word') {
      return {
        word, type,
        label:   'Type the Dutch word',
        prompt:  word.translation,
        lang:    'en',
        hint:    word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        answer:  word.term,
        explain: '"' + word.translation + '" → "' + word.term + '"'
      };
    }
    if (type === 'listen-pick') {
      return {
        word, type,
        label:   'What do you hear?',
        prompt:  '',
        audio:   word.term,
        lang:    'es',
        hint:    '',
        options: shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:  word.translation,
        explain: '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'listen-type') {
      return {
        word, type,
        label:   'Type what you hear',
        prompt:  '',
        audio:   word.term,
        lang:    'es',
        hint:    '',
        answer:  word.term,
        explain: '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'example-ctx') {
      const ex = word.examples[Math.floor(Math.random() * word.examples.length)];
      return {
        word, type,
        label:    'What does the highlighted word mean?',
        prompt:   ex.es,
        boldTerm: word.term,
        lang:     'es',
        hint:     '',
        options:  shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:   word.translation,
        explain:  word.definition || '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'sentence-scramble') {
      const valid = word.examples.filter(ex => ex.es && ex.es.split(' ').length >= 3);
      const ex = valid[Math.floor(Math.random() * valid.length)];
      return {
        word, type,
        label:         'Put the words in order',
        prompt:        ex.en || '',
        lang:          'en',
        hint:          '',
        scrambleWords: shuffle(ex.es.split(' ')),
        answer:        ex.es,
        explain:       'Full sentence: "' + ex.es + '"'
      };
    }
    if (type === 'fill-blank') {
      const valid = word.examples.filter(ex => ex.es && ex.es.toLowerCase().includes(word.term.toLowerCase()));
      const ex = valid[Math.floor(Math.random() * valid.length)];
      const blanked = ex.es.replace(new RegExp(escRe(word.term), 'gi'), '______');
      return {
        word, type,
        label:   'Fill in the blank',
        prompt:  blanked,
        lang:    'es',
        hint:    ex.en || '',
        options: shuffle([word.term, ...dist.map(w => w.term)]),
        answer:  word.term,
        explain: 'Full sentence: "' + ex.es + '"'
      };
    }
    return null;
  }

  /* ── Show question ────────────────────── */
  function showQuestion() {
    if (qIndex >= questions.length || hearts <= 0) { showFinish(); return; }
    currentQ = questions[qIndex];
    answered = false;
    currentPromptEs = currentQ.audio || (currentQ.lang === 'es' ? currentQ.prompt : '');

    document.getElementById('q-label').textContent     = currentQ.label;
    document.getElementById('prompt-hint').textContent = currentQ.hint || '';

    const pw = document.getElementById('prompt-word');
    if (currentQ.audio && !currentQ.prompt) {
      pw.innerHTML = '<span style="font-size:2em">🔊</span>';
    } else if (currentQ.boldTerm) {
      const esc = currentQ.prompt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      pw.innerHTML = esc.replace(new RegExp('(' + escRe(currentQ.boldTerm) + ')', 'gi'),
        '<strong class="q-highlight">$1</strong>');
    } else {
      pw.textContent = currentQ.prompt;
    }

    const ttsBtn = document.getElementById('btn-tts');
    ttsBtn.style.display = (VS.hasTTS() && (currentQ.audio || currentQ.lang === 'es')) ? '' : 'none';

    const isType     = currentQ.type === 'type-word'       || currentQ.type === 'listen-type';
    const isScramble = currentQ.type === 'sentence-scramble';
    const isMatch    = currentQ.type === 'match-pairs';
    document.getElementById('q-prompt').style.display         = isMatch    ? 'none' : '';
    document.getElementById('choices').style.display          = (!isType && !isScramble && !isMatch) ? '' : 'none';
    document.getElementById('type-area').style.display        = isType     ? '' : 'none';
    document.getElementById('scramble-area').style.display    = isScramble ? '' : 'none';
    document.getElementById('mp-grid').style.display          = isMatch    ? '' : 'none';

    if (!isType && !isScramble && !isMatch) {
      document.getElementById('choices').innerHTML = currentQ.options.map((opt, i) =>
        `<button class="choice-btn" id="c${i}" onclick="choose(${i})">${opt}</button>`
      ).join('');
    }
    if (isType) {
      const inp = document.getElementById('type-input');
      inp.value = ''; inp.disabled = false; inp.style.borderColor = '';
      setTimeout(() => inp.focus(), 50);
    }
    if (isScramble) renderScramble();
    if (isMatch)    renderMatchPairs();
    if (currentQ.audio) setTimeout(() => VS.speak(currentQ.audio), 400);

    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btn-continue').classList.remove('visible');
    updateProgress();
  }

  /* ── Answer ──────────────────────────── */
  function choose(i) {
    if (answered) return;
    answered = true;

    const chosen  = currentQ.options[i];
    const isRight = chosen === currentQ.answer;

    // Style all buttons
    currentQ.options.forEach((opt, j) => {
      const btn = document.getElementById('c' + j);
      btn.disabled = true;
      if (opt === currentQ.answer) btn.classList.add('reveal');
    });
    if (!isRight) document.getElementById('c' + i).classList.add('wrong');
    else          document.getElementById('c' + i).classList.add('correct');

    // Track result → feeds back into SRS + weak words
    VS.trackLessonResult(currentQ.word.id, isRight);

    if (isRight) {
      correctCount++;
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      // Track for end-of-lesson summary
      if (!wrongWords.find(w => w.id === currentQ.word.id)) {
        wrongWords.push(currentQ.word);
      }
      showFeedback(false,
        '✗ Incorrect — correct answer: "' + currentQ.answer + '"',
        currentQ.explain
      );
      if (VS.hasTTS()) VS.speak(currentQ.answer);
    }

    document.getElementById('btn-continue').classList.add('visible');
  }

  function showFeedback(ok, head, body) {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
    document.getElementById('fb-head').textContent = head;
    document.getElementById('fb-body').textContent = body;
  }

  function nextQuestion() {
    qIndex++;
    if (qIndex >= questions.length || hearts <= 0) { showFinish(); return; }
    showQuestion();
  }

  /* ── Finish ──────────────────────────── */
  function showFinish() {
    const h     = Math.max(0, hearts);
    const stars = h >= 3 ? '⭐⭐⭐' : h >= 2 ? '⭐⭐' : h >= 1 ? '⭐' : '💪';
    const xp    = correctCount * 10;

    document.getElementById('finish-stars').textContent   = stars;
    document.getElementById('fin-correct').textContent    = correctCount;
    document.getElementById('fin-wrong').textContent      = wrongCount;
    document.getElementById('fin-xp').textContent         = xp;

    // Show weak words summary if any
    const weakSummary = document.getElementById('weak-summary');
    const weakList    = document.getElementById('weak-list');
    if (wrongWords.length) {
      weakList.innerHTML = wrongWords.map(w =>
        `<div class="weak-word-item">
          <span class="ww-term">${w.term}</span>
          <span class="ww-trans">${w.translation}</span>
        </div>`
      ).join('');
      weakSummary.style.display = '';
    } else {
      weakSummary.style.display = 'none';
    }

    VS.recordStudyDay();
    showScreen('screen-finish');
  }

  /* ── Helpers ─────────────────────────── */
  function speakPrompt() {
    if (currentQ && currentQ.audio) VS.speak(currentQ.audio);
    else if (currentPromptEs) VS.speak(currentPromptEs);
  }

  /* ── Type input ──────────────────────── */
  function submitType() {
    if (answered) return;
    const inp = document.getElementById('type-input');
    const typed = inp.value.trim();
    if (!typed) return;
    answered = true;
    inp.disabled = true;

    const correct = currentQ.answer;
    const isRight = typed.toLowerCase() === correct.toLowerCase() ||
      lev(typed.toLowerCase(), correct.toLowerCase()) <= Math.floor(correct.length / 6);

    VS.trackLessonResult(currentQ.word.id, isRight);
    inp.style.borderColor = isRight ? '#27ae60' : '#e74c3c';

    if (isRight) {
      correctCount++;
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ The answer is "' + correct + '"', currentQ.explain);
      if (VS.hasTTS()) VS.speak(correct);
    }
    document.getElementById('btn-continue').classList.add('visible');
  }

  /* ── Sentence scramble ───────────────── */
  let scrambleSelected = [], scrambleWords = [];

  function renderScramble() {
    scrambleSelected = [];
    scrambleWords    = currentQ.scrambleWords.slice();
    updateScrambleUI();
  }

  function updateScrambleUI() {
    const used = new Set(scrambleSelected);
    document.getElementById('scramble-answer').innerHTML = scrambleSelected
      .map((idx, pos) =>
        `<button class="word-tile in-answer" onclick="removeFromAnswer(${pos})">${scrambleWords[idx]}</button>`)
      .join('');
    document.getElementById('scramble-bank').innerHTML = scrambleWords
      .map((w, idx) => used.has(idx)
        ? `<button class="word-tile" disabled>${w}</button>`
        : `<button class="word-tile" onclick="addToAnswer(${idx})">${w}</button>`)
      .join('');
  }

  function addToAnswer(idx) {
    if (answered) return;
    scrambleSelected.push(idx);
    if (scrambleSelected.length === scrambleWords.length) checkScramble();
    else updateScrambleUI();
  }

  function removeFromAnswer(pos) {
    if (answered) return;
    scrambleSelected.splice(pos, 1);
    updateScrambleUI();
  }

  function checkScramble() {
    if (answered) return;
    answered = true;
    const assembled = scrambleSelected.map(idx => scrambleWords[idx]).join(' ');
    const isRight   = assembled === currentQ.answer;

    VS.trackLessonResult(currentQ.word.id, isRight);
    document.querySelectorAll('.word-tile').forEach(t => { t.disabled = true; });

    if (isRight) {
      correctCount++;
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ Correct order: "' + currentQ.answer + '"', currentQ.explain);
    }
    document.getElementById('btn-continue').classList.add('visible');
  }

  function lev(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) =>
      Array.from({length: n+1}, (_, j) => i ? (j ? 0 : i) : j));
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
          1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  /* ── Match pairs ─────────────────────── */
  let mpLeftSel = null, mpRightSel = null, mpMatched = 0;
  let mpLeftOrder = [], mpRightOrder = [], mpWords = [];

  function renderMatchPairs() {
    mpLeftSel = null; mpRightSel = null; mpMatched = 0;
    mpWords      = currentQ.words;
    mpLeftOrder  = shuffle([0, 1, 2, 3]);
    mpRightOrder = shuffle([0, 1, 2, 3]);
    document.getElementById('mp-col-left').innerHTML = mpLeftOrder.map((wi, ti) =>
      `<button class="mp-tile" id="mlt${ti}" onclick="mpSelectLeft(${ti})">${escHtml(mpWords[wi].term)}</button>`
    ).join('');
    document.getElementById('mp-col-right').innerHTML = mpRightOrder.map((wi, ri) =>
      `<button class="mp-tile" id="mrt${ri}" onclick="mpSelectRight(${ri})">${escHtml(mpWords[wi].translation)}</button>`
    ).join('');
  }

  function mpSelectLeft(ti) {
    if (document.getElementById('mlt' + ti).disabled) return;
    if (mpLeftSel === ti) {
      document.getElementById('mlt' + ti).classList.remove('selected');
      mpLeftSel = null; return;
    }
    if (mpLeftSel !== null) document.getElementById('mlt' + mpLeftSel).classList.remove('selected');
    mpLeftSel = ti;
    document.getElementById('mlt' + ti).classList.add('selected');
    if (mpRightSel !== null) mpCheckMatch();
  }

  function mpSelectRight(ri) {
    if (document.getElementById('mrt' + ri).disabled) return;
    if (mpRightSel === ri) {
      document.getElementById('mrt' + ri).classList.remove('selected');
      mpRightSel = null; return;
    }
    if (mpRightSel !== null) document.getElementById('mrt' + mpRightSel).classList.remove('selected');
    mpRightSel = ri;
    document.getElementById('mrt' + ri).classList.add('selected');
    if (mpLeftSel !== null) mpCheckMatch();
  }

  function mpCheckMatch() {
    const ti = mpLeftSel, ri = mpRightSel;
    mpLeftSel = null; mpRightSel = null;
    const lBtn = document.getElementById('mlt' + ti);
    const rBtn = document.getElementById('mrt' + ri);

    if (mpLeftOrder[ti] === mpRightOrder[ri]) {
      lBtn.classList.remove('selected'); rBtn.classList.remove('selected');
      lBtn.classList.add('correct');     rBtn.classList.add('correct');
      lBtn.disabled = true;              rBtn.disabled = true;
      VS.trackLessonResult(mpWords[mpLeftOrder[ti]].id, true);
      mpMatched++;
      if (mpMatched === mpWords.length) setTimeout(() => nextQuestion(), 700);
    } else {
      wrongCount++; hearts--; updateHearts();
      if (!wrongWords.find(w => w.id === mpWords[mpLeftOrder[ti]].id))
        wrongWords.push(mpWords[mpLeftOrder[ti]]);
      VS.trackLessonResult(mpWords[mpLeftOrder[ti]].id, false);
      lBtn.classList.remove('selected'); rBtn.classList.remove('selected');
      lBtn.classList.add('wrong');       rBtn.classList.add('wrong');
      setTimeout(() => { lBtn.classList.remove('wrong'); rBtn.classList.remove('wrong'); }, 500);
    }
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateHearts() {
    const h = Math.max(0, hearts);
    document.getElementById('hearts').textContent =
      '❤️'.repeat(h) + '🖤'.repeat(3 - h);
  }

  function updateProgress() {
    const pct = questions.length ? Math.round(qIndex / questions.length * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function escRe(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
  initStart();
</script>
</body>
</html>
