<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flashcards — Dutch</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a252f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5;
           min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a252f; color: white;
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.88em; }
    .back:hover { color: white; }
    .header-mode {
      font-size: 0.75em; color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .prog-text { font-size: 0.8em; color: rgba(255,255,255,0.6); }

    .progress-bar { height: 5px; background: #2c3e50; flex-shrink: 0; }
    .progress-fill { height: 100%; background: #e67e22; transition: width .35s; }

    /* ── Screens ── */
    .screen { flex: 1; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    .center-box {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px; gap: 14px; text-align: center;
    }
    .big-icon { font-size: 3.2em; }
    .center-box h2 { font-size: 1.25em; font-weight: 800; color: #2c3e50; }
    .center-box p  { font-size: 0.88em; color: #7f8c8d; max-width: 280px; line-height: 1.5; }
    .btn-primary {
      padding: 14px 36px; background: #e67e22; color: white; border: none;
      border-radius: 14px; font-size: 0.95em; font-weight: 700; cursor: pointer;
    }
    .btn-secondary {
      padding: 12px 28px; background: #f0f2f5; color: #7f8c8d; border: none;
      border-radius: 14px; font-size: 0.88em; cursor: pointer;
      text-decoration: none; display: inline-block;
    }

    /* ── Card screen ── */
    #screen-card {
      padding: 16px 16px 20px; gap: 14px; align-items: stretch;
    }

    /* ── Mode banner ── */
    .mode-banner {
      display: none; background: #fef5e7; border-radius: 10px;
      padding: 8px 14px; font-size: 0.8em; color: #e67e22; font-weight: 600;
      text-align: center;
    }
    .mode-banner.visible { display: block; }

    /* ── Flip card ── */
    .flip-wrap {
      perspective: 1200px; min-height: 240px; flex: 1;
      position: relative;
    }
    .flip-inner {
      width: 100%; height: 100%; min-height: 240px;
      transform-style: preserve-3d;
      transition: transform .42s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .flip-inner.no-transition { transition: none !important; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; min-height: 240px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      background: white; border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px; cursor: pointer;
    }
    .card-back-face {
      transform: rotateY(180deg);
      justify-content: flex-start;
      border-top: 5px solid #e67e22;
    }
    .card-front-face { border-top: 5px solid #e67e22; }

    /* Drag overlays */
    .drag-overlay {
      position: absolute; inset: 0; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6em; font-weight: 800; opacity: 0; pointer-events: none;
      z-index: 10; letter-spacing: 1px;
    }
    .drag-correct { background: rgba(39,174,96,0.25); color: #27ae60; border: 3px solid rgba(39,174,96,0.5); }
    .drag-wrong   { background: rgba(231,76,60,0.25);  color: #e74c3c; border: 3px solid rgba(231,76,60,0.5); }

    /* Front */
    .front-label  { font-size: 0.7em; font-weight: 700; text-transform: uppercase;
                    letter-spacing: 1.5px; color: #bdc3c7; margin-bottom: 10px; }
    .card-term    { font-size: 2.1em; font-weight: 800; color: #2c3e50; text-align: center; line-height: 1.2; }
    .tap-hint     { font-size: 0.75em; color: #bdc3c7; margin-top: 14px; }
    .btn-tts-front {
      margin-top: 14px; background: #fef5e7; border: none; border-radius: 50%;
      width: 44px; height: 44px; font-size: 1.15em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background .2s;
    }
    .btn-tts-front:hover { background: #f5b7b1; }

    /* Back */
    .back-translation { font-size: 1.65em; font-weight: 800; color: #e67e22;
                        text-align: center; margin-bottom: 4px; }
    .back-pos  { font-size: 0.72em; color: #bdc3c7; text-transform: uppercase;
                 letter-spacing: 1px; margin-bottom: 12px; }
    .back-def  { font-size: 0.86em; color: #7f8c8d; text-align: center; margin-bottom: 16px;
                 line-height: 1.5; }
    .back-example {
      background: #f8f9fa; border-radius: 12px; padding: 12px 14px; width: 100%;
    }
    .ex-label { font-size: 0.65em; font-weight: 700; color: #bdc3c7; text-transform: uppercase;
                letter-spacing: 1px; margin-bottom: 6px; }
    .ex-es    { font-size: 0.88em; color: #2c3e50; font-style: italic; margin-bottom: 3px; }
    .ex-en    { font-size: 0.78em; color: #7f8c8d; }
    .btn-tts-ex {
      margin-top: 8px; background: #fef5e7; border: none; border-radius: 8px;
      padding: 6px 12px; font-size: 0.78em; cursor: pointer; color: #e67e22; font-weight: 600;
    }
    .btn-tts-ex:hover { background: #f5b7b1; }

    /* ── Grade area ── */
    .grade-area { display: none; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .grade-area.visible { display: flex; }

    .grade-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-grade {
      padding: 16px; border: none; border-radius: 14px;
      font-size: 1em; font-weight: 700; cursor: pointer; color: white;
      transition: transform .1s, opacity .1s;
    }
    .btn-grade:active { transform: scale(0.95); }
    .btn-grade.wrong   { background: #e74c3c; }
    .btn-grade.correct { background: #27ae60; }

    /* ── Done screen ── */
    .done-stats { display: flex; gap: 24px; justify-content: center; }
    .ds-num { font-size: 2em; font-weight: 800; color: #e67e22; }
    .ds-lbl { font-size: 0.75em; color: #7f8c8d; margin-top: 2px; }
    .ds     { text-align: center; }

    /* ── Mode toggle ── */
    .mode-toggle { display: flex; background: rgba(255,255,255,0.12); border-radius: 8px; padding: 2px; }
    .mode-toggle-btn { padding: 4px 12px; background: none; border: none; color: rgba(255,255,255,0.6);
                       font-size: 0.78em; font-weight: 700; cursor: pointer; border-radius: 6px; transition: all .15s; }
    .mode-toggle-btn.active { background: white; color: #1a252f; }

    /* ── Type mode UI ── */
    .type-area { display: none; flex-direction: column; gap: 8px; margin-top: 10px; width: 100%; }
    .type-area.visible { display: flex; }
    .type-input-row { display: flex; gap: 8px; }
    .type-input { flex: 1; padding: 12px 14px; border: 2px solid #e1e8ed; border-radius: 12px;
                  font-size: 1em; font-family: inherit; outline: none; text-align: center; }
    .type-input:focus { border-color: #e67e22; }
    .btn-check { padding: 12px 18px; background: #e67e22; color: white; border: none;
                 border-radius: 12px; font-size: 0.9em; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .type-result { font-size: 0.88em; text-align: center; min-height: 20px; font-weight: 700; }
    .type-result.correct { color: #27ae60; }
    .type-result.wrong   { color: #e74c3c; }
    .type-result.close   { color: #e67e22; }
  </style>
</head>
<body>

<header>
  <a class="back" href="index.html">← Dutch</a>
  <div class="mode-toggle" id="mode-toggle">
    <button class="mode-toggle-btn active" id="toggle-flip" onclick="setFlashMode('flip')">Flip</button>
    <button class="mode-toggle-btn"        id="toggle-type" onclick="setFlashMode('type')">Type</button>
  </div>
  <span class="prog-text" id="prog-text"></span>
</header>
<div class="progress-bar">
  <div class="progress-fill" id="prog-fill" style="width:0%"></div>
</div>

<!-- Start screen -->
<div class="screen active" id="screen-start">
  <div class="center-box">
    <div class="big-icon">🃏</div>
    <h2 id="start-title">Ready to review?</h2>
    <p  id="start-sub">Loading…</p>
    <button class="btn-primary" id="btn-start" onclick="startSession()">Start</button>
    <a class="btn-secondary" href="index.html">Back</a>
  </div>
</div>

<!-- Card screen -->
<div class="screen" id="screen-card">

  <div class="mode-banner" id="mode-banner">💪 Weak Words Mode — drilling words you've been getting wrong</div>

  <div class="flip-wrap" id="flip-wrap">
    <div class="flip-inner" id="flip-inner" onclick="onCardClick(event)">

      <!-- Front -->
      <div class="card-face card-front-face">
        <div class="front-label" id="front-label">Dutch</div>
        <div class="card-term" id="card-term"></div>
        <div class="tap-hint" id="tap-hint">tap to reveal</div>
        <button class="btn-tts-front" id="btn-tts-f" style="display:none"
                onclick="event.stopPropagation(); VS.speak(currentCard.term)">🔊</button>
        <div class="type-area" id="type-area">
          <div class="type-input-row">
            <input class="type-input" id="type-input" type="text" placeholder="Type the Dutch…"
                   autocomplete="off" spellcheck="false" autocorrect="off"
                   onkeydown="if(event.key==='Enter')submitType()">
            <button class="btn-check" onclick="submitType()">Check</button>
          </div>
          <div class="type-result" id="type-result"></div>
        </div>
      </div>

      <!-- Back -->
      <div class="card-face card-back-face">
        <div class="back-translation" id="back-trans"></div>
        <div class="back-pos"         id="back-pos"></div>
        <div class="back-def"         id="back-def"></div>
        <div class="back-example" id="back-example" style="display:none">
          <div class="ex-label">Example</div>
          <div class="ex-es" id="ex-es"></div>
          <div class="ex-en" id="ex-en"></div>
          <button class="btn-tts-ex" id="btn-tts-ex" style="display:none"
                  onclick="event.stopPropagation(); VS.speak(currentExample)">🔊 Hear it</button>
        </div>
      </div>

    </div>

    <!-- Drag feedback overlays -->
    <div class="drag-overlay drag-correct" id="drag-correct">✓ Correct</div>
    <div class="drag-overlay drag-wrong"   id="drag-wrong">✗ Wrong</div>
  </div>

  <div class="grade-area" id="grade-area">
    <div class="grade-row">
      <button class="btn-grade wrong"   onclick="grade(0)">✗ Wrong</button>
      <button class="btn-grade correct" onclick="grade(2)">✓ Correct</button>
    </div>
  </div>

</div>

<!-- Done screen -->
<div class="screen" id="screen-done">
  <div class="center-box">
    <div class="big-icon">🎉</div>
    <h2>Session done!</h2>
    <div class="done-stats">
      <div class="ds"><div class="ds-num" id="done-total">0</div><div class="ds-lbl">Reviewed</div></div>
      <div class="ds"><div class="ds-num" id="done-wrong">0</div><div class="ds-lbl">Wrong</div></div>
      <div class="ds"><div class="ds-num" id="done-correct">0</div><div class="ds-lbl">Correct</div></div>
    </div>
    <button class="btn-primary" onclick="restartSession()">More cards</button>
    <a class="btn-secondary" href="index.html">Back to Hub</a>
  </div>
</div>

<script src="vocab.js"></script>
<script>
  const params   = new URLSearchParams(location.search);
  const weakMode = params.get('mode') === 'weak';

  let queue = [], current = 0, wrongCount = 0;
  let currentCard = null, currentExample = '';
  let revealed = false;
  let typeSubmitted = false;
  let flashMode = VS.getSettings().flashMode || 'flip';

  /* ── Init ─────────────────────────────── */
  function getQueue() {
    return weakMode ? VS.getWeak(50) : VS.getDue(50);
  }

  function initStart() {
    applyModeToggleUI();
    const q = getQueue();

    if (!q.length) {
      document.getElementById('start-title').textContent =
        weakMode ? 'No weak words! 🌟' : 'All caught up! 🌟';
      document.getElementById('start-sub').textContent =
        weakMode
          ? 'You have no words marked as struggling. Do some lessons first.'
          : 'No cards are due right now. Try a lesson to mark new words.';
      document.getElementById('btn-start').textContent = 'Back';
      document.getElementById('btn-start').onclick = () => location.href = 'index.html';
    } else {
      document.getElementById('start-title').textContent =
        weakMode ? `${q.length} word${q.length > 1 ? 's' : ''} to drill` : 'Ready to review?';
      document.getElementById('start-sub').textContent =
        weakMode
          ? 'These are words you\'ve been getting wrong in lessons. Let\'s fix that.'
          : `${q.length} card${q.length > 1 ? 's' : ''} due for review · swipe or tap to grade`;
    }
  }

  function startSession() {
    queue = getQueue();
    if (!queue.length) { location.href = 'index.html'; return; }
    current = 0; wrongCount = 0;
    showScreen('screen-card');
    if (weakMode) document.getElementById('mode-banner').classList.add('visible');
    showCard();
  }

  /* ── Card flow ───────────────────────── */
  function showCard() {
    if (current >= queue.length) { showDone(); return; }
    currentCard = queue[current];
    revealed = false;
    typeSubmitted = false;

    const fi = document.getElementById('flip-inner');
    fi.classList.remove('flipped', 'no-transition');
    fi.style.transform = '';
    document.getElementById('grade-area').classList.remove('visible');
    document.getElementById('drag-correct').style.opacity = 0;
    document.getElementById('drag-wrong').style.opacity   = 0;

    const isType = flashMode === 'type';

    document.getElementById('front-label').textContent = isType ? 'English' : 'Dutch';
    document.getElementById('card-term').textContent   = isType ? currentCard.translation : currentCard.term;
    document.getElementById('tap-hint').style.display  = isType ? 'none' : '';
    if (!isType) document.getElementById('tap-hint').textContent = 'tap to reveal';

    const typeArea = document.getElementById('type-area');
    typeArea.classList.toggle('visible', isType);
    if (isType) {
      document.getElementById('type-input').value   = '';
      document.getElementById('type-result').textContent = '';
      document.getElementById('type-result').className   = 'type-result';
      setTimeout(() => document.getElementById('type-input').focus(), 50);
    }

    const ttsBtn = document.getElementById('btn-tts-f');
    if (VS.hasTTS() && !isType) ttsBtn.style.display = '';
    else                         ttsBtn.style.display = 'none';

    document.getElementById('back-trans').textContent = currentCard.translation || '';
    document.getElementById('back-pos').textContent   = currentCard.partOfSpeech || '';
    document.getElementById('back-def').textContent   = currentCard.definition   || '';

    const exEl = document.getElementById('back-example');
    if (currentCard.examples && currentCard.examples.length) {
      const ex = currentCard.examples[0];
      currentExample = ex.es;
      document.getElementById('ex-es').textContent = ex.es;
      document.getElementById('ex-en').textContent = ex.en || '';
      exEl.style.display = '';
      document.getElementById('btn-tts-ex').style.display = VS.hasTTS() ? '' : 'none';
    } else {
      exEl.style.display = 'none';
    }

    updateProgress();
  }

  /* ── Flip ───────────────────────────── */
  function onCardClick(e) {
    if (isDragging) return;
    if (flashMode === 'type' && !typeSubmitted) return;
    const fi = document.getElementById('flip-inner');
    if (!revealed) {
      fi.classList.add('flipped');
      document.getElementById('grade-area').classList.add('visible');
      document.getElementById('tap-hint').textContent = 'tap to flip back';
      revealed = true;
      if (VS.hasTTS()) VS.speak(currentCard.term);
    } else {
      fi.classList.toggle('flipped');
    }
  }

  /* ── Grade ──────────────────────────── */
  function grade(g) {
    document.querySelectorAll('.btn-grade').forEach(b => { b.style.opacity = ''; b.style.transform = ''; });
    const updated = VS.applyGrade(currentCard, g);
    VS.update(updated.id, updated);

    if (g === 0) {
      wrongCount++;
      queue.splice(Math.min(current + 3, queue.length), 0, { ...updated });
    }

    current++;
    showCard();
  }

  function updateProgress() {
    const total = queue.length;
    const pct   = total ? Math.round(current / total * 100) : 100;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-text').textContent = `${current} / ${total}`;
  }

  /* ── Done ────────────────────────────── */
  function showDone() {
    VS.recordStudyDay();
    document.getElementById('done-total').textContent   = current;
    document.getElementById('done-wrong').textContent   = wrongCount;
    document.getElementById('done-correct').textContent = current - wrongCount;
    showScreen('screen-done');
  }

  function restartSession() {
    showScreen('screen-start');
    initStart();
  }

  /* ── Drag to grade ──────────────────── */
  const DRAG_THRESHOLD = 90;
  let isDragging = false, dragStartX = 0;

  const flipWrap    = document.getElementById('flip-wrap');
  const flipInner   = document.getElementById('flip-inner');
  const overlayOk   = document.getElementById('drag-correct');
  const overlayWrong = document.getElementById('drag-wrong');

  flipWrap.addEventListener('pointerdown', e => {
    if (!revealed) return;
    if (flashMode === 'type' && !typeSubmitted) return;
    if (e.target.closest('button')) return;
    isDragging  = true;
    dragStartX  = e.clientX;
    flipInner.classList.add('no-transition');
    flipWrap.setPointerCapture(e.pointerId);
  });

  flipWrap.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx      = e.clientX - dragStartX;
    const rot     = dx * 0.06;
    const isFlipped = flipInner.classList.contains('flipped');
    flipInner.style.transform =
      `translateX(${dx}px) rotate(${rot}deg)${isFlipped ? ' rotateY(180deg)' : ''}`;

    const ratio = Math.min(Math.abs(dx) / DRAG_THRESHOLD, 1);
    if (dx > 0) {
      overlayOk.style.opacity    = ratio;
      overlayWrong.style.opacity = 0;
    } else {
      overlayWrong.style.opacity = ratio;
      overlayOk.style.opacity    = 0;
    }
  });

  flipWrap.addEventListener('pointerup', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.clientX - dragStartX;
    flipInner.classList.remove('no-transition');

    if (dx > DRAG_THRESHOLD) {
      flyOut('right');
    } else if (dx < -DRAG_THRESHOLD) {
      flyOut('left');
    } else {
      // Snap back
      const isFlipped = flipInner.classList.contains('flipped');
      flipInner.style.transform = isFlipped ? 'rotateY(180deg)' : '';
      setTimeout(() => { if (!isDragging) flipInner.style.transform = ''; }, 450);
      overlayOk.style.opacity    = 0;
      overlayWrong.style.opacity = 0;
    }
  });

  flipWrap.addEventListener('pointercancel', () => {
    if (!isDragging) return;
    isDragging = false;
    flipInner.classList.remove('no-transition');
    const isFlipped = flipInner.classList.contains('flipped');
    flipInner.style.transform = isFlipped ? 'rotateY(180deg)' : '';
    setTimeout(() => { if (!isDragging) flipInner.style.transform = ''; }, 450);
    overlayOk.style.opacity    = 0;
    overlayWrong.style.opacity = 0;
  });

  function flyOut(dir) {
    const isFlipped = flipInner.classList.contains('flipped');
    const tx  = dir === 'right' ? '130vw' : '-130vw';
    const rot = dir === 'right' ? 25 : -25;
    flipInner.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    flipInner.style.transform  =
      `translateX(${tx}) rotate(${rot}deg)${isFlipped ? ' rotateY(180deg)' : ''}`;
    overlayOk.style.opacity    = 0;
    overlayWrong.style.opacity = 0;
    setTimeout(() => {
      flipInner.style.transition = '';
      grade(dir === 'right' ? 2 : 0);
    }, 370);
  }

  /* ── Mode toggle ────────────────────── */
  function setFlashMode(mode) {
    flashMode = mode;
    VS.saveSettings({ flashMode: mode });
    applyModeToggleUI();
    if (document.getElementById('screen-card').classList.contains('active')) showCard();
  }

  function applyModeToggleUI() {
    document.getElementById('toggle-flip').classList.toggle('active', flashMode === 'flip');
    document.getElementById('toggle-type').classList.toggle('active', flashMode === 'type');
  }

  /* ── Type mode ───────────────────────── */
  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
          : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  function normalise(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  }

  function submitType() {
    if (typeSubmitted) return;
    const typed   = document.getElementById('type-input').value;
    const answer  = normalise(typed);
    const correct = normalise(currentCard.term);
    const dist    = levenshtein(answer, correct);

    const resultEl = document.getElementById('type-result');
    let isCorrect;

    if (answer === correct) {
      resultEl.textContent = '✓ Correct!';
      resultEl.className   = 'type-result correct';
      isCorrect = true;
    } else if (dist <= 1 && answer.length > 1) {
      resultEl.textContent = `Close! (${currentCard.term})`;
      resultEl.className   = 'type-result close';
      isCorrect = true;
    } else {
      resultEl.textContent = `✗ Answer: ${currentCard.term}`;
      resultEl.className   = 'type-result wrong';
      isCorrect = false;
    }

    typeSubmitted = true;
    document.getElementById('type-input').disabled = true;

    const fi = document.getElementById('flip-inner');
    fi.classList.add('flipped');
    revealed = true;
    document.getElementById('grade-area').classList.add('visible');

    const btns = document.querySelectorAll('.btn-grade');
    btns.forEach(b => b.style.opacity = '0.4');
    const idx = isCorrect ? 1 : 0;
    btns[idx].style.opacity = '1';
    btns[idx].style.transform = 'scale(1.04)';
  }

  /* ── Util ────────────────────────────── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
  initStart();
</script>
</body>
</html>
