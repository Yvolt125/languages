<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lesson — Spanish</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0f172a; color: #f1f5f9;
      height: 100vh; height: 100dvh;
      overflow: hidden; display: flex; flex-direction: column;
    }

    header {
      background: #0f172a; padding: 0 16px;
      height: 48px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
      border-bottom: 1px solid #1e293b;
    }
    .back { color: #64748b; text-decoration: none; font-size: 0.85em; font-weight: 600; }
    .back:hover { color: #f1f5f9; }
    .build-ver { font-size: 0.58em; color: #334155; letter-spacing: 0.4px; }
    .lives { display: flex; align-items: center; gap: 5px; }
    .life { width: 10px; height: 10px; border-radius: 50%; background: #60a5fa; transition: background .3s; }
    .life.off { background: #1e293b; border: 1.5px solid #334155; }

    .seg-progress {
      display: flex; gap: 3px; padding: 8px 16px 6px;
      background: #0f172a; flex-shrink: 0;
    }
    .seg { flex: 1; height: 4px; border-radius: 99px; background: #1e293b; transition: background .3s; }
    .seg.done    { background: #60a5fa; }
    .seg.current { background: #3b82f6; }

    .offline-banner {
      display: none; background: #92400e; color: #fde68a;
      text-align: center; padding: 5px 16px; font-size: 0.77em; font-weight: 600; flex-shrink: 0;
    }
    .offline-banner.visible { display: block; }

    .screen { flex: 1; min-height: 0; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Start / Finish ── */
    .center-box {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 16px; text-align: center;
    }
    .big-icon { font-size: 3.2em; }
    h2 { font-size: 1.3em; font-weight: 800; color: #f1f5f9; }
    .sub { font-size: 0.87em; color: #64748b; max-width: 300px; line-height: 1.5; }
    .build-stamp { font-size: 0.65em; color: #334155; }
    .btn-primary {
      padding: 15px 40px; background: #60a5fa; color: #0f172a;
      border: none; border-radius: 99px; font-size: 0.95em; font-weight: 800; cursor: pointer;
    }
    .btn-primary:hover { background: #93c5fd; }
    .btn-secondary {
      padding: 12px 28px; background: #1e293b; color: #64748b;
      border: 1.5px solid #334155; border-radius: 99px;
      font-size: 0.87em; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block;
    }
    .btn-secondary:hover { color: #f1f5f9; }
    .stars { font-size: 2.4em; letter-spacing: 6px; }
    .score-row { display: flex; gap: 24px; justify-content: center; }
    .sc { text-align: center; }
    .sc-num { font-size: 2em; font-weight: 800; color: #60a5fa; }
    .sc-lbl { font-size: 0.73em; color: #64748b; margin-top: 2px; }
    .weak-summary {
      background: #1c1507; border: 1.5px solid #78350f; border-radius: 16px;
      padding: 14px 16px; max-width: 340px; width: 100%; text-align: left;
    }
    .weak-summary h3 { font-size: 0.83em; color: #fbbf24; font-weight: 700; margin-bottom: 8px; }
    .weak-word-item { font-size: 0.82em; color: #f1f5f9; padding: 3px 0; border-bottom: 1px solid #292016; }
    .weak-word-item:last-child { border-bottom: none; }
    .weak-word-item .ww-term  { font-weight: 700; }
    .weak-word-item .ww-trans { color: #64748b; margin-left: 6px; }

    /* ── Question screen ── */
    #screen-q { gap: 0; overflow: hidden; }

    /* Top zone: label + optional prompt, sizes to content */
    .q-top {
      flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 20px; gap: 8px;
    }

    .q-label {
      font-size: 0.72em; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: #60a5fa;
      background: #172554; padding: 4px 14px; border-radius: 99px;
    }

    .q-prompt { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .prompt-word { font-size: 1.9em; font-weight: 800; color: #f1f5f9; line-height: 1.2; }
    .prompt-word.is-sentence { font-size: 1.05em; font-weight: 700; line-height: 1.5; color: #cbd5e1; }
    .prompt-hint { font-size: 0.78em; color: #64748b; }
    .q-highlight { color: #60a5fa; }
    .btn-tts {
      background: #172554; border: 1.5px solid #1e40af;
      border-radius: 99px; padding: 5px 14px;
      font-size: 0.78em; cursor: pointer; color: #93c5fd; font-weight: 600;
    }
    .btn-tts:hover { background: #1e3a8a; }

    /* Bottom zone: answer body + action bar */
    .q-bottom {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      padding: 0 16px;
    }

    /* Answer body: fills available space, no scroll (scramble bank scrolls internally) */
    .q-body {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Multiple choice: 2×2 grid */
    .choices {
      flex: 1; min-height: 0;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; align-content: center;
    }
    .choice-btn {
      background: #1e293b; border: 2px solid #334155;
      border-radius: 16px; font-size: 0.9em; font-weight: 600;
      color: #f1f5f9; cursor: pointer; padding: 14px 10px;
      display: flex; align-items: center; justify-content: center;
      text-align: center; line-height: 1.3;
      transition: border-color .15s, background .15s;
    }
    .choice-btn:hover:not(:disabled) { border-color: #60a5fa; background: #172554; color: #93c5fd; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { border-color: #34d399 !important; background: #052e16 !important; color: #34d399 !important; }
    .choice-btn.wrong   { border-color: #f87171 !important; background: #450a0a !important; color: #f87171 !important; }
    .choice-btn.reveal  { border-color: #34d399 !important; background: #052e16 !important; color: #34d399 !important; }

    /* Type word */
    .type-area {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      justify-content: center; gap: 12px;
    }
    .type-input {
      width: 100%; padding: 15px 18px;
      background: #1e293b; border: 2px solid #334155;
      border-radius: 14px; font-size: 1em; font-family: inherit;
      color: #f1f5f9; transition: border-color .15s;
    }
    .type-input:focus { outline: none; border-color: #60a5fa; }
    .type-input::placeholder { color: #475569; }
    .btn-submit {
      padding: 15px; background: #60a5fa; color: #0f172a;
      border: none; border-radius: 99px; font-size: 1em; font-weight: 800; cursor: pointer;
    }
    .btn-submit:hover { background: #93c5fd; }

    /* Sentence scramble */
    .scramble-area { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 10px; }
    .scramble-answer {
      flex-shrink: 0; min-height: 52px;
      background: #1e293b; border-radius: 14px; padding: 10px 12px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      border: 2px dashed #334155;
    }
    .scramble-bank {
      flex: 1; min-height: 0; overflow-y: auto;
      display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px;
    }
    .word-tile {
      padding: 9px 14px; background: #1e293b; border: 2px solid #334155;
      border-radius: 12px; cursor: pointer; font-size: 0.93em; font-weight: 600;
      color: #f1f5f9; transition: border-color .15s, opacity .15s;
    }
    .word-tile:hover:not(:disabled) { border-color: #60a5fa; }
    .word-tile:disabled { opacity: 0.35; cursor: default; }
    .word-tile.in-answer { border-color: #60a5fa; background: #172554; color: #93c5fd; }

    /* Match pairs */
    .mp-grid { flex: 1; min-height: 0; display: flex; gap: 10px; }
    .mp-col  { flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
    .mp-tile {
      flex: 1; min-height: 52px; max-height: 90px; width: 100%; padding: 8px 6px;
      background: #1e293b; border: 2px solid #334155; border-radius: 14px;
      font-size: 0.87em; font-weight: 600; color: #f1f5f9; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-align: center; transition: border-color .15s, background .15s;
      line-height: 1.25; word-break: break-word;
    }
    .mp-tile:hover:not(:disabled) { border-color: #60a5fa; background: #172554; color: #93c5fd; }
    .mp-tile.selected { border-color: #60a5fa; background: #172554; color: #93c5fd; }
    .mp-tile.correct  { border-color: #34d399 !important; background: #052e16 !important; color: #34d399 !important; }
    .mp-tile.wrong    { border-color: #f87171 !important; background: #450a0a !important; color: #f87171 !important; }
    .mp-tile:disabled { cursor: default; }
    .mp-tile.mp-audio { font-size: 1.6em; }

    /* Flip card */
    #card-area {
      perspective: 1200px;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column; gap: 10px;
    }
    .fc-wrap {
      flex: 1; min-height: 0; width: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform .42s cubic-bezier(.4,0,.2,1);
    }
    .fc-wrap.flipped { transform: rotateY(180deg); }
    .fc-front, .fc-back {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      background: #1e293b; border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px; cursor: pointer;
      border: 2px solid #334155;
    }
    .fc-back { transform: rotateY(180deg); justify-content: flex-start; }
    .fc-term { font-size: 2.2em; font-weight: 800; color: #f1f5f9; text-align: center; line-height: 1.2; }
    .fc-tap-hint { font-size: 0.72em; color: #475569; margin-top: 14px; }
    .fc-back-trans { font-size: 1.6em; font-weight: 800; color: #60a5fa; text-align: center; margin-bottom: 6px; }
    .fc-back-def { font-size: 0.82em; color: #64748b; text-align: center; line-height: 1.5; margin-top: 8px; }
    .fc-grade-row { flex-shrink: 0; display: none; gap: 10px; }
    .fc-grade-row.visible { display: flex; }
    .btn-grade-wrong   { flex: 1; padding: 14px; background: #450a0a; color: #f87171; border: 2px solid #f87171; border-radius: 99px; font-size: 0.93em; font-weight: 700; cursor: pointer; }
    .btn-grade-correct { flex: 1; padding: 14px; background: #052e16; color: #34d399; border: 2px solid #34d399; border-radius: 99px; font-size: 0.93em; font-weight: 700; cursor: pointer; }
    .fc-type-area { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; width: 100%; }
    .fc-type-input {
      width: 100%; padding: 12px 14px; background: #0f172a; border: 2px solid #334155;
      border-radius: 12px; font-size: 1em; font-family: inherit; outline: none;
      text-align: center; color: #f1f5f9;
    }
    .fc-type-input:focus { border-color: #60a5fa; }
    .fc-type-input::placeholder { color: #475569; }
    .btn-fc-check {
      padding: 12px; background: #60a5fa; color: #0f172a;
      border: none; border-radius: 99px; font-size: 0.9em; font-weight: 800; cursor: pointer;
    }

    /* Action bar: always at bottom, never pushed */
    .q-bar {
      flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
      padding: 10px 0 max(20px, env(safe-area-inset-bottom));
    }

    /* Feedback chip: visibility:hidden keeps layout stable */
    .fb-chip {
      border-radius: 12px; padding: 10px 16px;
      display: flex; flex-direction: column; gap: 2px;
      visibility: hidden; min-height: 46px;
    }
    .fb-chip.show { visibility: visible; }
    .fb-chip.correct { background: #052e16; border: 1.5px solid #10b981; }
    .fb-chip.wrong   { background: #450a0a; border: 1.5px solid #ef4444; }
    .fb-head { font-size: 0.83em; font-weight: 800; }
    .fb-chip.correct .fb-head { color: #34d399; }
    .fb-chip.wrong   .fb-head { color: #f87171; }
    .fb-body {
      font-size: 0.76em; font-weight: 500; color: #94a3b8;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    .btn-continue {
      width: 100%; padding: 16px; background: #60a5fa; color: #0f172a;
      border: none; border-radius: 99px; font-size: 1em; font-weight: 800; cursor: pointer;
      visibility: hidden;
    }
    .btn-continue.visible { visibility: visible; }
    .btn-continue:hover { background: #93c5fd; }
  </style>
</head>
<body>

<header>
  <a class="back" href="index.html" onclick="return !lessonActive || confirm('Leave this lesson? Your progress will be lost.')">← Spanish</a>
  <span class="build-ver">2026-05-02 14:00</span>
  <div class="lives" id="lives">
    <span class="life"></span><span class="life"></span><span class="life"></span>
  </div>
</header>
<div class="offline-banner" id="offline-banner">You're offline — lesson progress will still be saved</div>
<div class="seg-progress" id="seg-progress"></div>

<!-- Start screen -->
<div class="screen active" id="screen-start">
  <div class="center-box">
    <div class="big-icon">🎯</div>
    <h2 id="start-title">Let's practice!</h2>
    <p class="sub" id="start-sub">Loading…</p>
    <button class="btn-primary" id="btn-start" onclick="startLesson()">Begin</button>
    <a class="btn-secondary" href="index.html">Back</a>
    <p class="build-stamp">Updated 2026-05-02 14:00</p>
  </div>
</div>

<!-- Question screen -->
<div class="screen" id="screen-q">
  <div class="q-top" id="q-top">
    <div class="q-label" id="q-label"></div>
    <div class="q-prompt" id="q-prompt">
      <div class="prompt-word" id="prompt-word"></div>
      <div class="prompt-hint" id="prompt-hint"></div>
      <button class="btn-tts" id="btn-tts" style="display:none" onclick="speakPrompt()">🔊 Listen</button>
    </div>
  </div>
  <div class="q-bottom">
    <div class="q-body" id="q-body">
      <div class="choices" id="choices"></div>
      <div class="type-area" id="type-area" style="display:none">
        <input type="text" id="type-input" class="type-input"
               placeholder="Type your answer…"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               onkeydown="if(event.key==='Enter')submitType()">
        <button class="btn-submit" onclick="submitType()">Check →</button>
      </div>
      <div class="scramble-area" id="scramble-area" style="display:none">
        <div class="scramble-answer" id="scramble-answer"></div>
        <div class="scramble-bank"   id="scramble-bank"></div>
      </div>
      <div class="mp-grid" id="mp-grid" style="display:none">
        <div class="mp-col" id="mp-col-left"></div>
        <div class="mp-col" id="mp-col-right"></div>
      </div>
      <div id="card-area" style="display:none">
        <div class="fc-wrap" id="fc-wrap" onclick="onFcClick()">
          <div class="fc-front" id="fc-front">
            <div class="fc-term" id="fc-term"></div>
            <div class="fc-tap-hint" id="fc-tap-hint">tap to reveal</div>
            <button class="btn-tts" id="fc-btn-tts" style="display:none"
                    onclick="event.stopPropagation(); VS.speak(currentQ.word.term)">🔊 Listen</button>
            <div class="fc-type-area" id="fc-type-area" style="display:none">
              <input class="fc-type-input" id="fc-type-input" type="text"
                     placeholder="Type the Spanish word…"
                     autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                     onkeydown="if(event.key==='Enter')submitFcType()">
              <button class="btn-fc-check" onclick="submitFcType()">Check →</button>
            </div>
          </div>
          <div class="fc-back" id="fc-back">
            <div class="fc-back-trans" id="fc-back-trans"></div>
            <div class="fc-back-def"   id="fc-back-def"></div>
          </div>
        </div>
        <div class="fc-grade-row" id="fc-grade-row">
          <button class="btn-grade-wrong"   onclick="fcGrade(false)">✗ Wrong</button>
          <button class="btn-grade-correct" onclick="fcGrade(true)">✓ Correct</button>
        </div>
      </div>
    </div>
    <div class="q-bar">
      <div class="fb-chip" id="feedback">
        <div class="fb-head" id="fb-head"></div>
        <div class="fb-body" id="fb-body"></div>
      </div>
      <button class="btn-continue" id="btn-continue" onclick="nextQuestion()">Continue →</button>
    </div>
  </div>
</div>

<!-- Finish screen -->
<div class="screen" id="screen-finish">
  <div class="center-box">
    <div class="stars"  id="finish-stars">⭐⭐⭐</div>
    <h2>Lesson complete!</h2>
    <div class="score-row">
      <div class="sc"><div class="sc-num" id="fin-correct">0</div><div class="sc-lbl">Correct</div></div>
      <div class="sc"><div class="sc-num" id="fin-wrong">0</div><div class="sc-lbl">Wrong</div></div>
      <div class="sc"><div class="sc-num" id="fin-xp">0</div><div class="sc-lbl">XP</div></div>
      <div class="sc"><div class="sc-num" id="fin-daily">0/3</div><div class="sc-lbl">Today</div></div>
    </div>
    <div class="weak-summary" id="weak-summary" style="display:none">
      <h3>💪 Added to Weak Words — these will appear more often:</h3>
      <div id="weak-list"></div>
    </div>
    <button class="btn-primary" onclick="startLesson()">Play Again</button>
    <a class="btn-secondary" href="index.html">Back to Hub</a>
  </div>
</div>

<script src="vocab.js"></script>
<script>
  const SFX = (() => {
    let _ctx = null;
    function ctx() {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    }
    function tone(freq, type, duration, gainVal, startTime, ac) {
      const g = ac.createGain();
      const o = ac.createOscillator();
      o.type = type;
      o.frequency.setValueAtTime(freq, startTime);
      g.gain.setValueAtTime(gainVal, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      o.connect(g); g.connect(ac.destination);
      o.start(startTime); o.stop(startTime + duration);
    }
    return {
      correct() {
        try {
          const ac = ctx(), t = ac.currentTime;
          tone(600, 'sine', 0.12, 0.3, t,        ac);
          tone(900, 'sine', 0.18, 0.3, t + 0.10, ac);
        } catch(_) {}
      },
      wrong() {
        try {
          const ac = ctx(), t = ac.currentTime;
          tone(220, 'sawtooth', 0.22, 0.25, t, ac);
        } catch(_) {}
      },
      finish() {
        try {
          const ac = ctx(), t = ac.currentTime;
          [523, 659, 784, 1047].forEach((f, i) =>
            tone(f, 'sine', 0.18, 0.28, t + i * 0.14, ac)
          );
        } catch(_) {}
      }
    };
  })();

  const SESSION_SIZE = 10;
  let questions = [], qIndex = 0, hearts = 3, correctCount = 0, wrongCount = 0;
  let lessonActive = false;
  let currentQ = null, answered = false, currentPromptEs = '';
  let wrongWords = [];

  function initStart() {
    const all = VS.getAll();
    const btn = document.getElementById('btn-start');
    if (all.length < 4) {
      document.getElementById('start-title').textContent = 'Need more words';
      document.getElementById('start-sub').textContent =
        'Add at least 4 vocabulary words to the hub before starting a lesson.';
      btn.textContent = 'Add Words';
      btn.onclick = () => location.href = 'index.html';
    } else {
      const mode = new URLSearchParams(location.search).get('pool');
      document.getElementById('start-title').textContent =
        mode === 'weak' ? 'Drill Weak Words' : mode === 'due' ? 'Review Due Words' : "Let's practice!";
      document.getElementById('start-sub').textContent =
        mode === 'weak' ? 'Focusing on words you\'ve been getting wrong — drill until they stick' :
        mode === 'due'  ? 'Words due for spaced repetition review' :
        `${all.length} word${all.length !== 1 ? 's' : ''} in your vocabulary · max 3 new per session`;
      btn.onclick = startLesson;
    }
  }

  function startLesson() {
    lessonActive = true;
    const all = VS.getAll();
    if (all.length < 4) { location.href = 'index.html'; return; }

    const mode = new URLSearchParams(location.search).get('pool');
    let pool;
    if (mode === 'weak') {
      pool = shuffle(VS.getWeak()).slice(0, SESSION_SIZE);
    } else if (mode === 'due') {
      pool = VS.getDue(SESSION_SIZE);
      if (pool.length < SESSION_SIZE) {
        const poolIds = new Set(pool.map(w => w.id));
        pool = [...pool, ...shuffle(all.filter(w => !poolIds.has(w.id))).slice(0, SESSION_SIZE - pool.length)];
      }
    } else {
      const newWords = shuffle(all.filter(w => !w.lastReview)).slice(0, 3);
      const newIds   = new Set(newWords.map(w => w.id));
      const dueWords = VS.getDue().filter(w => !newIds.has(w.id));
      const dueIds   = new Set(dueWords.map(w => w.id));
      const remaining = shuffle(all.filter(w => !newIds.has(w.id) && !dueIds.has(w.id)));
      const slots = SESSION_SIZE - newWords.length;
      pool = shuffle([...newWords, ...[...dueWords, ...remaining].slice(0, slots)]);
    }

    const indivQs = pool.map(w => makeQuestion(w, all)).filter(Boolean);
    const matchRounds = [];
    for (let i = 0; i + 3 < pool.length; i += 4) {
      const useListen = VS.hasTTS() && Math.random() < 0.5;
      matchRounds.push({
        type:  useListen ? 'listen-match' : 'match-pairs',
        label: useListen ? 'Tap 🔊 to hear, then match the translation' : 'Match each word with its translation',
        words: pool.slice(i, i + 4)
      });
    }
    questions = [];
    let mi = 0;
    indivQs.forEach((q, idx) => {
      questions.push(q);
      if ((idx + 1) % 4 === 0 && mi < matchRounds.length) questions.push(matchRounds[mi++]);
    });
    if (mi < matchRounds.length) questions.push(...matchRounds.slice(mi));
    wrongWords  = [];
    qIndex      = 0;
    hearts      = 3;
    correctCount= 0;
    wrongCount  = 0;

    if (!questions.length) { location.href = 'index.html'; return; }

    updateHearts(); renderSegments();
    showScreen('screen-q');
    showQuestion();
  }

  function makeQuestion(word, all) {
    const others = shuffle(all.filter(w => w.id !== word.id));
    if (others.length < 3) return null;
    const dist = others.slice(0, 3);

    const types = ['es-to-en', 'en-to-es', 'type-word', 'flip-card', 'type-card'];
    if (VS.hasTTS() && !word.term.includes(' ')) types.push('listen-pick', 'listen-type');
    if (word.examples && word.examples.length) {
      types.push('example-ctx');
      if (word.examples.some(ex => ex.es && ex.es.split(' ').length >= 3))
        types.push('sentence-scramble');
      if (word.examples.some(ex => ex.es && ex.es.toLowerCase().includes(word.term.toLowerCase())))
        types.push('fill-blank');
    }
    const type = types[Math.floor(Math.random() * types.length)];

    if (type === 'es-to-en') {
      return {
        word, type,
        label:        'What does this mean?',
        prompt:       word.term,
        lang:         'es',
        hint:         word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        options:      shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:       word.translation,
        speakOnWrong: false,
        explain:      word.definition || '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'en-to-es') {
      return {
        word, type,
        label:        'How do you say this in Spanish?',
        prompt:       word.translation,
        lang:         'en',
        hint:         word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        options:      shuffle([word.term, ...dist.map(w => w.term)]),
        answer:       word.term,
        speakOnWrong: true,
        explain:      word.definition || '"' + word.translation + '" → "' + word.term + '"'
      };
    }
    if (type === 'type-word') {
      return {
        word, type,
        label:        'Type the Spanish word',
        prompt:       word.translation,
        lang:         'en',
        hint:         word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        answer:       word.term,
        speakOnWrong: true,
        explain:      '"' + word.translation + '" → "' + word.term + '"'
      };
    }
    if (type === 'listen-pick') {
      return {
        word, type,
        label:        'What do you hear?',
        prompt:       '',
        audio:        word.term,
        lang:         'es',
        hint:         '',
        options:      shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:       word.translation,
        speakOnWrong: false,
        explain:      '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'listen-type') {
      return {
        word, type,
        label:        'Type what you hear',
        prompt:       '',
        audio:        word.term,
        lang:         'es',
        hint:         '',
        answer:       word.term,
        speakOnWrong: true,
        explain:      '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'example-ctx') {
      const ex = word.examples[Math.floor(Math.random() * word.examples.length)];
      return {
        word, type,
        label:        'What does the highlighted word mean?',
        prompt:       ex.es,
        boldTerm:     word.term,
        lang:         'es',
        hint:         '',
        options:      shuffle([word.translation, ...dist.map(w => w.translation)]),
        answer:       word.translation,
        speakOnWrong: false,
        explain:      word.definition || '"' + word.term + '" means "' + word.translation + '"'
      };
    }
    if (type === 'sentence-scramble') {
      const valid = word.examples.filter(ex => ex.es && ex.es.split(' ').length >= 3);
      const ex = valid[Math.floor(Math.random() * valid.length)];
      return {
        word, type,
        label:         'Put the words in order',
        prompt:        ex.en || '',
        lang:          'en',
        hint:          '',
        scrambleWords: shuffle(ex.es.split(' ')),
        answer:        ex.es,
        speakOnWrong:  true,
        explain:       'Full sentence: "' + ex.es + '"'
      };
    }
    if (type === 'fill-blank') {
      const valid = word.examples.filter(ex => ex.es && ex.es.toLowerCase().includes(word.term.toLowerCase()));
      const ex = valid[Math.floor(Math.random() * valid.length)];
      const blanked = ex.es.replace(new RegExp(escRe(word.term) + '\\S*', 'gi'), '______');
      return {
        word, type,
        label:        'Fill in the blank',
        prompt:       blanked,
        audio:        ex.es,
        lang:         'es',
        hint:         ex.en || '',
        options:      shuffle([word.term, ...dist.map(w => w.term)]),
        answer:       word.term,
        speakOnWrong: true,
        explain:      'Full sentence: "' + ex.es + '"'
      };
    }
    if (type === 'flip-card') {
      return {
        word, type,
        label: 'Tap to flip — then grade yourself',
        prompt: '', lang: 'es', hint: ''
      };
    }
    if (type === 'type-card') {
      return {
        word, type,
        label:   'Type the Spanish word',
        prompt:  '', lang: 'en',
        hint:    word.partOfSpeech ? '(' + word.partOfSpeech + ')' : '',
        answer:  word.term,
        explain: '"' + word.translation + '" → "' + word.term + '"'
      };
    }
    return null;
  }

  function showQuestion() {
    if (qIndex >= questions.length || hearts <= 0) { showFinish(); return; }
    currentQ = questions[qIndex];
    answered = false;
    currentPromptEs = currentQ.audio || (currentQ.lang !== 'en' ? currentQ.prompt : '');

    document.getElementById('q-label').textContent     = currentQ.label;
    document.getElementById('prompt-hint').textContent = currentQ.hint || '';

    const pw = document.getElementById('prompt-word');
    if (currentQ.audio && !currentQ.prompt) {
      pw.innerHTML = '<span style="font-size:2em">🔊</span>';
    } else if (currentQ.boldTerm) {
      const esc = currentQ.prompt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      pw.innerHTML = esc.replace(new RegExp('(' + escRe(currentQ.boldTerm) + '\\S*)', 'gi'),
        '<strong class="q-highlight">$1</strong>');
    } else {
      pw.textContent = currentQ.prompt;
    }

    const isSentencePrompt = ['fill-blank', 'example-ctx'].includes(currentQ.type);
    pw.classList.toggle('is-sentence', isSentencePrompt);

    const ttsBtn = document.getElementById('btn-tts');
    ttsBtn.style.display = (VS.hasTTS() && (currentQ.audio || currentQ.lang !== 'en')) ? '' : 'none';

    const isType     = currentQ.type === 'type-word'       || currentQ.type === 'listen-type';
    const isScramble = currentQ.type === 'sentence-scramble';
    const isMatch    = currentQ.type === 'match-pairs' || currentQ.type === 'listen-match';
    const isFlipCard = currentQ.type === 'flip-card';
    const isTypeCard = currentQ.type === 'type-card';
    const isCard     = isFlipCard || isTypeCard;

    document.getElementById('q-prompt').style.display        = (isMatch || isCard) ? 'none' : '';
    document.getElementById('choices').style.display         = (!isType && !isScramble && !isMatch && !isCard) ? '' : 'none';
    document.getElementById('type-area').style.display       = isType     ? '' : 'none';
    document.getElementById('scramble-area').style.display   = isScramble ? '' : 'none';
    document.getElementById('mp-grid').style.display         = isMatch    ? '' : 'none';
    document.getElementById('card-area').style.display       = isCard     ? '' : 'none';

    if (!isType && !isScramble && !isMatch && !isCard) {
      document.getElementById('choices').innerHTML = currentQ.options.map((opt, i) =>
        `<button class="choice-btn" id="c${i}" onclick="choose(${i})">${opt}</button>`
      ).join('');
    }
    if (isType) {
      const inp = document.getElementById('type-input');
      inp.value = ''; inp.disabled = false; inp.style.borderColor = '';
      setTimeout(() => inp.focus(), 50);
    }
    if (isScramble)  renderScramble();
    if (isMatch)     renderMatchPairs();
    if (isFlipCard)  renderFlipCard();
    if (isTypeCard)  renderTypeCard();
    if (currentQ.audio) setTimeout(() => VS.speak(currentQ.audio), 400);

    document.getElementById('feedback').className = 'fb-chip';
    document.getElementById('btn-continue').classList.remove('visible');
    renderSegments();
  }

  function choose(i) {
    if (answered) return;
    answered = true;

    const chosen  = currentQ.options[i];
    const isRight = chosen === currentQ.answer;

    currentQ.options.forEach((opt, j) => {
      const btn = document.getElementById('c' + j);
      btn.disabled = true;
      if (opt === currentQ.answer) btn.classList.add('reveal');
    });
    if (!isRight) document.getElementById('c' + i).classList.add('wrong');
    else          document.getElementById('c' + i).classList.add('correct');

    VS.recordAnswer(currentQ.word.id, isRight);

    if (isRight) {
      correctCount++;
      SFX.correct();
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ Correct answer: "' + currentQ.answer + '"', currentQ.explain);
      if (VS.hasTTS() && currentQ.speakOnWrong) VS.speak(currentQ.answer);
    }

    document.getElementById('btn-continue').classList.add('visible');
  }

  function showFeedback(ok, head, body) {
    const fb = document.getElementById('feedback');
    fb.className = 'fb-chip show ' + (ok ? 'correct' : 'wrong');
    document.getElementById('fb-head').textContent = head;
    document.getElementById('fb-body').textContent = body;
  }

  function nextQuestion() {
    qIndex++;
    if (qIndex >= questions.length || hearts <= 0) { showFinish(); return; }
    showQuestion();
  }

  function showFinish() {
    lessonActive = false;
    const h     = Math.max(0, hearts);
    const stars = h >= 3 ? '⭐⭐⭐' : h >= 2 ? '⭐⭐' : h >= 1 ? '⭐' : '💪';
    const xp    = correctCount * 10;

    document.getElementById('finish-stars').textContent = stars;
    document.getElementById('fin-correct').textContent  = correctCount;
    document.getElementById('fin-wrong').textContent    = wrongCount;
    document.getElementById('fin-xp').textContent       = xp;

    const weakSummary = document.getElementById('weak-summary');
    const weakList    = document.getElementById('weak-list');
    if (wrongWords.length) {
      weakList.innerHTML = wrongWords.map(w =>
        `<div class="weak-word-item">
          <span class="ww-term">${w.term}</span>
          <span class="ww-trans">${w.translation}</span>
        </div>`
      ).join('');
      weakSummary.style.display = '';
    } else {
      weakSummary.style.display = 'none';
    }

    const dailyCount = VS.recordLessonComplete();
    document.getElementById('fin-daily').textContent = dailyCount + ' / 3';
    showScreen('screen-finish');
    setTimeout(() => SFX.finish(), 300);
  }

  function speakPrompt() {
    if (currentQ && currentQ.audio) VS.speak(currentQ.audio);
    else if (currentPromptEs) VS.speak(currentPromptEs);
  }

  function submitType() {
    if (answered) return;
    const inp = document.getElementById('type-input');
    const typed = inp.value.trim();
    if (!typed) return;
    answered = true;
    inp.disabled = true;
    inp.blur();

    const correct = currentQ.answer;
    const isRight = typed.toLowerCase() === correct.toLowerCase() ||
      lev(typed.toLowerCase(), correct.toLowerCase()) <= Math.floor(correct.length / 6);

    VS.recordAnswer(currentQ.word.id, isRight);
    inp.style.borderColor = isRight ? '#34d399' : '#f87171';

    if (isRight) {
      correctCount++;
      SFX.correct();
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ The answer is "' + correct + '"', currentQ.explain);
      if (VS.hasTTS()) VS.speak(correct);
    }
    document.getElementById('btn-continue').classList.add('visible');
  }

  let scrambleSelected = [], scrambleWords = [];

  function renderScramble() {
    scrambleSelected = [];
    scrambleWords    = currentQ.scrambleWords.slice();
    updateScrambleUI();
  }

  function updateScrambleUI() {
    const used = new Set(scrambleSelected);
    document.getElementById('scramble-answer').innerHTML = scrambleSelected
      .map((idx, pos) =>
        `<button class="word-tile in-answer" onclick="removeFromAnswer(${pos})">${scrambleWords[idx]}</button>`)
      .join('');
    document.getElementById('scramble-bank').innerHTML = scrambleWords
      .map((w, idx) => used.has(idx)
        ? `<button class="word-tile" disabled>${w}</button>`
        : `<button class="word-tile" onclick="addToAnswer(${idx})">${w}</button>`)
      .join('');
  }

  function addToAnswer(idx) {
    if (answered) return;
    scrambleSelected.push(idx);
    if (scrambleSelected.length === scrambleWords.length) checkScramble();
    else updateScrambleUI();
  }

  function removeFromAnswer(pos) {
    if (answered) return;
    scrambleSelected.splice(pos, 1);
    updateScrambleUI();
  }

  function checkScramble() {
    if (answered) return;
    answered = true;
    const assembled = scrambleSelected.map(idx => scrambleWords[idx]).join(' ');
    const isRight   = assembled === currentQ.answer;

    VS.recordAnswer(currentQ.word.id, isRight);
    document.querySelectorAll('.word-tile').forEach(t => { t.disabled = true; });

    if (isRight) {
      correctCount++;
      SFX.correct();
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++;
      hearts--;
      updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ Correct order: "' + currentQ.answer + '"', currentQ.explain);
    }
    document.getElementById('btn-continue').classList.add('visible');
  }

  function lev(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) =>
      Array.from({length: n+1}, (_, j) => i ? (j ? 0 : i) : j));
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
          1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  let mpLeftSel = null, mpRightSel = null, mpMatched = 0;
  let mpLeftOrder = [], mpRightOrder = [], mpWords = [];

  function renderMatchPairs() {
    mpLeftSel = null; mpRightSel = null; mpMatched = 0;
    mpWords      = currentQ.words;
    mpLeftOrder  = shuffle([0, 1, 2, 3]);
    mpRightOrder = shuffle([0, 1, 2, 3]);
    const isListen = currentQ.type === 'listen-match';
    document.getElementById('mp-col-left').innerHTML = mpLeftOrder.map((wi, ti) =>
      isListen
        ? `<button class="mp-tile mp-audio" id="mlt${ti}" data-term="${escHtml(mpWords[wi].term)}" onclick="mpAudioLeft(${ti},this.dataset.term)">🔊</button>`
        : `<button class="mp-tile" id="mlt${ti}" onclick="mpSelectLeft(${ti})">${escHtml(mpWords[wi].term)}</button>`
    ).join('');
    document.getElementById('mp-col-right').innerHTML = mpRightOrder.map((wi, ri) =>
      `<button class="mp-tile" id="mrt${ri}" onclick="mpSelectRight(${ri})">${escHtml(mpWords[wi].translation)}</button>`
    ).join('');
  }

  function mpAudioLeft(ti, term) {
    VS.speak(term);
    mpSelectLeft(ti);
  }

  function mpSelectLeft(ti) {
    if (document.getElementById('mlt' + ti).disabled) return;
    if (mpLeftSel === ti) {
      document.getElementById('mlt' + ti).classList.remove('selected');
      mpLeftSel = null; return;
    }
    if (mpLeftSel !== null) document.getElementById('mlt' + mpLeftSel).classList.remove('selected');
    mpLeftSel = ti;
    document.getElementById('mlt' + ti).classList.add('selected');
    if (mpRightSel !== null) mpCheckMatch();
  }

  function mpSelectRight(ri) {
    if (document.getElementById('mrt' + ri).disabled) return;
    if (mpRightSel === ri) {
      document.getElementById('mrt' + ri).classList.remove('selected');
      mpRightSel = null; return;
    }
    if (mpRightSel !== null) document.getElementById('mrt' + mpRightSel).classList.remove('selected');
    mpRightSel = ri;
    document.getElementById('mrt' + ri).classList.add('selected');
    if (mpLeftSel !== null) mpCheckMatch();
  }

  function mpCheckMatch() {
    const ti = mpLeftSel, ri = mpRightSel;
    mpLeftSel = null; mpRightSel = null;
    const lBtn = document.getElementById('mlt' + ti);
    const rBtn = document.getElementById('mrt' + ri);

    if (mpLeftOrder[ti] === mpRightOrder[ri]) {
      lBtn.classList.remove('selected'); rBtn.classList.remove('selected');
      lBtn.classList.add('correct');     rBtn.classList.add('correct');
      lBtn.disabled = true;              rBtn.disabled = true;
      SFX.correct();
      VS.recordAnswer(mpWords[mpLeftOrder[ti]].id, true);
      mpMatched++;
      if (mpMatched === mpWords.length) setTimeout(() => nextQuestion(), 700);
    } else {
      wrongCount++; hearts--; updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === mpWords[mpLeftOrder[ti]].id))
        wrongWords.push(mpWords[mpLeftOrder[ti]]);
      VS.recordAnswer(mpWords[mpLeftOrder[ti]].id, false);
      lBtn.classList.remove('selected'); rBtn.classList.remove('selected');
      lBtn.classList.add('wrong');       rBtn.classList.add('wrong');
      setTimeout(() => { lBtn.classList.remove('wrong'); rBtn.classList.remove('wrong'); }, 500);
    }
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function normalise(s) {
    return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
  }

  let fcRevealed = false;

  function renderFlipCard() {
    fcRevealed = false;
    document.getElementById('fc-wrap').classList.remove('flipped');
    document.getElementById('fc-term').textContent       = currentQ.word.term;
    document.getElementById('fc-back-trans').textContent = currentQ.word.translation;
    document.getElementById('fc-back-def').textContent   = currentQ.word.definition || '';
    document.getElementById('fc-tap-hint').style.display  = '';
    document.getElementById('fc-type-area').style.display = 'none';
    document.getElementById('fc-grade-row').classList.remove('visible');
    document.getElementById('fc-btn-tts').style.display   = VS.hasTTS() ? '' : 'none';
  }

  function renderTypeCard() {
    fcRevealed = false;
    document.getElementById('fc-wrap').classList.remove('flipped');
    document.getElementById('fc-term').textContent        = currentQ.word.translation;
    document.getElementById('fc-back-trans').textContent  = currentQ.word.term;
    document.getElementById('fc-back-def').textContent    = currentQ.word.definition || '';
    document.getElementById('fc-tap-hint').style.display  = 'none';
    document.getElementById('fc-type-area').style.display = '';
    document.getElementById('fc-grade-row').classList.remove('visible');
    document.getElementById('fc-btn-tts').style.display   = 'none';
    const inp = document.getElementById('fc-type-input');
    inp.value = ''; inp.disabled = false; inp.style.borderColor = '';
    setTimeout(() => inp.focus(), 50);
  }

  function onFcClick() {
    if (answered || currentQ.type === 'type-card') return;
    if (!fcRevealed) {
      document.getElementById('fc-wrap').classList.add('flipped');
      document.getElementById('fc-grade-row').classList.add('visible');
      if (VS.hasTTS()) VS.speak(currentQ.word.term);
      fcRevealed = true;
    }
  }

  function fcGrade(isCorrect) {
    if (answered) return;
    answered = true;
    VS.recordAnswer(currentQ.word.id, isCorrect);
    if (isCorrect) {
      correctCount++;
      SFX.correct();
      showFeedback(true, '✓ Marked correct', currentQ.word.translation);
    } else {
      wrongCount++; hearts--; updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ Marked wrong', '"' + currentQ.word.term + '" = "' + currentQ.word.translation + '"');
    }
    document.getElementById('fc-grade-row').classList.remove('visible');
    document.getElementById('btn-continue').classList.add('visible');
  }

  function submitFcType() {
    if (answered) return;
    const inp   = document.getElementById('fc-type-input');
    const typed = inp.value.trim();
    if (!typed) return;
    answered = true; inp.disabled = true; inp.blur();
    const correct   = currentQ.answer;
    const normTyped = normalise(typed);
    const normCorr  = normalise(correct);
    const dist      = lev(normTyped, normCorr);
    const isRight   = normTyped === normCorr || (dist <= 1 && normTyped.length > 1);
    inp.style.borderColor = isRight ? '#34d399' : '#f87171';
    document.getElementById('fc-wrap').classList.add('flipped');
    fcRevealed = true;
    if (VS.hasTTS()) VS.speak(currentQ.word.term);
    VS.recordAnswer(currentQ.word.id, isRight);
    if (isRight) {
      correctCount++;
      SFX.correct();
      showFeedback(true, '✓ Correct!', currentQ.explain);
    } else {
      wrongCount++; hearts--; updateHearts();
      SFX.wrong();
      if (!wrongWords.find(w => w.id === currentQ.word.id)) wrongWords.push(currentQ.word);
      showFeedback(false, '✗ The answer is "' + correct + '"', currentQ.explain);
    }
    document.getElementById('btn-continue').classList.add('visible');
  }

  function updateHearts() {
    const dots = document.querySelectorAll('.life');
    const h = Math.max(0, hearts);
    dots.forEach((d, i) => d.classList.toggle('off', i >= h));
  }

  function renderSegments() {
    const container = document.getElementById('seg-progress');
    const total = questions.length || SESSION_SIZE;
    container.innerHTML = Array.from({length: total}, (_, i) => {
      const cls = i < qIndex ? 'seg done' : i === qIndex ? 'seg current' : 'seg';
      return `<div class="${cls}"></div>`;
    }).join('');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function escRe(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function updateOfflineUI() {
    document.getElementById('offline-banner').classList.toggle('visible', !navigator.onLine);
  }
  window.addEventListener('online',  updateOfflineUI);
  window.addEventListener('offline', updateOfflineUI);

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');
  updateOfflineUI();
  initStart();
</script>
